name: CI-CD Pipeline for Kops + Terraform

on:
  push:
    branches: ["main"]
  pull_request:

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.7.0

jobs:

  # -----------------------------
  # CI: Terraform validation
  # -----------------------------
  terraform-ci:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false   # 🔥 IMPORTANT FIX

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform FMT
        working-directory: ./kops-init
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ./kops-init
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./kops-init
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./kops-init
        run: terraform plan


  # -----------------------------
  # CD: Apply Infra + Create/Update Cluster
  # -----------------------------
  deploy:
    name: Deploy Infra + Kops Cluster
    needs: terraform-ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false   # 🔥 IMPORTANT FIX

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Terraform Apply ---
      - name: Terraform Init
        working-directory: ./kops-init
        run: terraform init

      - name: Terraform Apply
        working-directory: ./kops-init
        run: terraform apply -auto-approve

      # --- Install kops & kubectl ---
      - name: Install Kops
        run: |
          curl -Lo kops https://github.com/kubernetes/kops/releases/download/v1.28.0/kops-linux-amd64
          chmod +x kops
          sudo mv kops /usr/local/bin/

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # --- Run your Kops scripts ---
      - name: Run Create Cluster Script
        working-directory: ./scripts
        run: bash create-cluster.sh

      - name: Update IAM profile if needed
        working-directory: ./scripts
        run: |
          bash update-iam-profile.sh || echo "IAM already updated"
